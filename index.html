<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFS Yacht - Marine Couture</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#FBF7E6',
                            100: '#F5EECB',
                            200: '#EAD998',
                            300: '#DFC466',
                            400: '#D4AF37', // Ana Gold Rengi
                            500: '#B89225',
                            600: '#947218',
                            700: '#735614',
                            800: '#543D10',
                            900: '#38280A',
                        },
                        navy: {
                            900: '#020617',
                            800: '#0B1D35',
                        }
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    keyframes: {
                        'fade-in-up': {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        'fade-in-up': 'fade-in-up 1s ease-out forwards',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D4AF37;
        }

        .light-mode ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body class="bg-[#020617] text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON COMPONENTS (SVG) ---
        // Lucide React kütüphanesi yerine tarayıcı uyumlu inline SVG'ler
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Menu = (p) => <IconBase {...p}><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></IconBase>;
        const X = (p) => <IconBase {...p}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></IconBase>;
        const Globe = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10" /><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" /><path d="M2 12h20" /></IconBase>;
        const Sun = (p) => <IconBase {...p}><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></IconBase>;
        const Moon = (p) => <IconBase {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></IconBase>;
        const Instagram = (p) => <IconBase {...p}><rect width="20" height="20" x="2" y="2" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" x2="17.51" y1="6.5" y2="6.5" /></IconBase>;
        const Linkedin = (p) => <IconBase {...p}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" /><rect width="4" height="12" x="2" y="9" /><circle cx="4" cy="4" r="2" /></IconBase>;
        const Mail = (p) => <IconBase {...p}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></IconBase>;
        const Phone = (p) => <IconBase {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" /></IconBase>;
        const ArrowRight = (p) => <IconBase {...p}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></IconBase>;
        const Anchor = (p) => <IconBase {...p}><circle cx="12" cy="5" r="3" /><line x1="12" x2="12" y1="22" y2="8" /><path d="M5 12H2a10 10 0 0 0 20 0h-3" /></IconBase>;
        const Shield = (p) => <IconBase {...p}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" /></IconBase>;
        const Wind = (p) => <IconBase {...p}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2" /><path d="M9.6 4.6A2 2 0 1 1 11 8H2" /><path d="M12.6 19.4A2 2 0 1 0 14 16H2" /></IconBase>;
        const Scissors = (p) => <IconBase {...p}><circle cx="6" cy="6" r="3" /><circle cx="6" cy="18" r="3" /><line x1="20" x2="8.12" y1="4" y2="15.88" /><line x1="14.47" x2="20" y1="14.48" y2="20" /><line x1="8.12" x2="12" y1="8.12" y2="12" /></IconBase>;
        const ChevronRight = (p) => <IconBase {...p}><path d="m9 18 6-6-6-6" /></IconBase>;
        const PenTool = (p) => <IconBase {...p}><path d="m12 19 7-7 3 3-7 7-3-3z" /><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" /><path d="m2 2 7.586 7.586" /><circle cx="11" cy="11" r="2" /></IconBase>;
        const Star = (p) => <IconBase {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></IconBase>;


        // --- COMPONENTS ---

        const Navbar = ({ darkMode, setDarkMode }) => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [language, setLanguage] = useState('TR');

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navBg = isScrolled
                ? (darkMode ? 'bg-[#020617]/90 border-white/5' : 'bg-white/95 border-slate-200 shadow-sm')
                : 'bg-transparent border-transparent';

            return (
                <nav className={`fixed w-full z-50 transition-all duration-500 ease-in-out border-b ${navBg} py-4`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className={`p-2 flex items-center justify-center border transition-all duration-300 ${isScrolled ? (darkMode ? 'border-amber-500/50 bg-[#0B1D35]' : 'border-amber-600/20 bg-slate-100') : 'border-white/20 bg-black/20'}`}>
                                <h1 className={`text-xl tracking-[0.1em] font-serif font-bold leading-none ${isScrolled ? (darkMode ? 'text-white' : 'text-slate-900') : 'text-white'}`}>
                                    AFS<span className="text-amber-500">YACHT</span>
                                </h1>
                            </div>
                        </div>
                        <div className="hidden md:flex items-center space-x-8">
                            {['Koleksiyon', 'Atölye', 'Blog', 'İletişim'].map((item) => (
                                <a key={item} href={`#${item.toLowerCase()}`} className={`text-sm uppercase tracking-widest hover:text-amber-500 transition-colors duration-300 font-medium ${isScrolled ? (darkMode ? 'text-slate-300' : 'text-slate-600') : 'text-slate-200'}`}>{item}</a>
                            ))}
                            <div className={`flex items-center gap-4 border-l pl-6 ${isScrolled ? (darkMode ? 'border-slate-700' : 'border-slate-300') : 'border-slate-600'}`}>
                                <button onClick={() => setDarkMode(!darkMode)} className={`p-2 rounded-full transition-colors ${isScrolled ? (darkMode ? 'text-slate-400 hover:text-amber-500' : 'text-slate-500 hover:text-amber-600') : 'text-white/80 hover:text-white'}`}>
                                    {darkMode ? <Sun size={18} /> : <Moon size={18} />}
                                </button>
                                <div className="flex items-center gap-2">
                                    <Globe size={16} className="text-amber-500" />
                                    <button onClick={() => setLanguage('TR')} className={`text-xs font-bold ${language === 'TR' ? 'text-amber-500' : (isScrolled && !darkMode ? 'text-slate-500 hover:text-slate-900' : 'text-slate-400 hover:text-white')}`}>TR</button>
                                    <span className={isScrolled && !darkMode ? 'text-slate-300' : 'text-slate-700'}>|</span>
                                    <button onClick={() => setLanguage('EN')} className={`text-xs font-bold ${language === 'EN' ? 'text-amber-500' : (isScrolled && !darkMode ? 'text-slate-500 hover:text-slate-900' : 'text-slate-400 hover:text-white')}`}>EN</button>
                                </div>
                            </div>
                            <button className={`border px-6 py-2 text-xs uppercase tracking-widest transition-all duration-300 shadow-[0_0_15px_rgba(245,158,11,0.1)] hover:shadow-[0_0_20px_rgba(245,158,11,0.4)] ${isScrolled ? 'border-amber-500/50 text-amber-500 hover:bg-amber-500 hover:text-white' : 'border-amber-500/50 text-amber-500 hover:bg-amber-500 hover:text-white'}`}>Teklif İste</button>
                        </div>
                        <button className={isScrolled ? (darkMode ? 'text-white' : 'text-slate-900') : 'text-white'} onClick={() => setIsMenuOpen(!isMenuOpen)}>
                            {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                        </button>
                    </div>
                    {isMenuOpen && (
                        <div className={`absolute top-full left-0 w-full border-t py-10 flex flex-col items-center space-y-6 md:hidden shadow-xl ${darkMode ? 'bg-[#0B1D35] border-slate-800 text-white' : 'bg-white border-slate-100 text-slate-900'}`}>
                            {['Koleksiyon', 'Atölye', 'Blog', 'İletişim'].map((item) => (<a key={item} href="#" className="text-lg font-serif tracking-widest hover:text-amber-500">{item}</a>))}
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => {
            return (
                <header className="relative h-screen flex items-center justify-center overflow-hidden bg-black">
                    <div className="absolute inset-0 z-0">
                        <img src="https://images.unsplash.com/photo-1621695669145-22d7168b9815?q=80&w=1964&auto=format&fit=crop" alt="Hero" className="w-full h-full object-cover opacity-70" />
                        <div className="absolute inset-0 bg-gradient-to-t from-[#020617] via-[#051120]/60 to-[#020617]/30"></div>
                    </div>
                    <div className="relative z-10 w-full container mx-auto px-6 mt-20 text-center md:text-left">
                        <div className="max-w-3xl">
                            <span className="inline-block border-b border-amber-500 pb-2 text-amber-500 text-xs md:text-sm tracking-[0.3em] uppercase mb-6 animate-pulse font-bold drop-shadow-md">Handmade Marine Goods</span>
                            <h2 className="text-5xl md:text-7xl font-serif text-white mb-6 leading-tight drop-shadow-2xl">Zanaatın <br /> <span className="italic text-amber-400 font-light">Deniz Hali.</span></h2>
                            <p className="text-slate-200 text-sm md:text-lg tracking-wide font-light max-w-xl mb-10 leading-relaxed md:mr-auto md:ml-0 mx-auto drop-shadow-md">Seri üretim değil, size özel üretim. Teknenizin karakterine uygun, el işçiliği deri usturmaça askıları ve marin aksesuarlar.</p>
                            <div className="flex flex-col md:flex-row gap-6 items-center justify-center md:justify-start">
                                <button className="bg-amber-600 text-white px-10 py-4 text-xs uppercase tracking-[0.2em] hover:bg-amber-500 transition-all duration-300 w-full md:w-auto shadow-[0_0_20px_rgba(245,158,11,0.3)]">Koleksiyonu İncele</button>
                                <button className="flex items-center gap-2 text-slate-300 text-xs uppercase tracking-[0.2em] hover:text-amber-400 transition-colors group"><span className="border-b border-slate-500 group-hover:border-amber-400 pb-1 transition-colors">Whatsapp Sipariş</span><ChevronRight size={14} className="group-hover:translate-x-1 transition-transform" /></button>
                            </div>
                        </div>
                    </div>
                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 animate-bounce opacity-40">
                        <div className="w-[1px] h-16 bg-gradient-to-b from-amber-500 to-transparent"></div>
                    </div>
                </header>
            );
        };

        const Workshop = ({ darkMode }) => {
            const headingColor = darkMode ? 'text-white' : 'text-slate-900';
            const subTextColor = darkMode ? 'text-slate-400' : 'text-slate-600';
            const sectionBg = darkMode ? 'bg-[#051120]' : 'bg-white';
            const borderColor = darkMode ? 'border-slate-800' : 'border-slate-200';

            return (
                <section id="atölye" className={`py-24 relative transition-colors duration-500 ${sectionBg}`}>
                    {darkMode && <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-amber-900/30 to-transparent"></div>}
                    <div className="container mx-auto px-6">
                        <div className="flex flex-col lg:flex-row gap-16 items-center">
                            <div className="lg:w-1/2 grid grid-cols-2 gap-4">
                                <div className={`relative group overflow-hidden rounded-sm border ${borderColor}`}><div className="absolute inset-0 bg-amber-500/10 opacity-0 group-hover:opacity-100 transition-opacity z-10"></div><img src="https://images.unsplash.com/photo-1605218427306-635ba243971c?q=80&w=1888&auto=format&fit=crop" alt="Derin Detay" className="w-full h-72 object-cover transition-transform duration-700 group-hover:scale-110" /></div>
                                <div className={`relative group overflow-hidden rounded-sm mt-12 border ${borderColor}`}><div className="absolute inset-0 bg-amber-500/10 opacity-0 group-hover:opacity-100 transition-opacity z-10"></div><img src="https://images.unsplash.com/photo-1549419161-59424c30c345?q=80&w=2070&auto=format&fit=crop" alt="Craftsman" className="w-full h-72 object-cover transition-transform duration-700 group-hover:scale-110" /></div>
                            </div>
                            <div className="lg:w-1/2">
                                <span className="text-amber-500 text-xs tracking-[0.2em] uppercase font-bold flex items-center gap-3"><span className="w-8 h-[1px] bg-amber-500"></span> Atölyemizden</span>
                                <h3 className={`text-3xl md:text-5xl font-serif mt-4 mb-8 leading-tight ${headingColor}`}>Her Dikişte <br /><span className="italic text-amber-500">Ustalık.</span></h3>
                                <p className={`leading-loose font-light mb-6 text-lg ${subTextColor}`}>AFS Yacht olarak biz büyük bir fabrika değiliz, detaylara aşık bir atölyeyiz. Usturmaça askılarımız ve kılıflarımız, en kaliteli marin deriler kullanılarak sipariş üzerine hazırlanır.</p>
                                <div className={`flex gap-12 border-t pt-8 ${borderColor}`}><div className="flex flex-col"><span className={`font-serif text-4xl ${headingColor}`}>100%</span><span className="text-xs uppercase tracking-widest text-amber-500 mt-2">El Yapımı</span></div><div className="flex flex-col"><span className={`font-serif text-4xl ${headingColor}`}>A+</span><span className="text-xs uppercase tracking-widest text-amber-500 mt-2">Kalite Deri</span></div></div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Products = ({ darkMode }) => {
            const bgMain = darkMode ? 'bg-[#020617]' : 'bg-slate-50';
            const cardBg = darkMode ? 'bg-[#051120] border-slate-800' : 'bg-white border-slate-200 shadow-sm';
            const headingColor = darkMode ? 'text-white' : 'text-slate-900';
            const subTextColor = darkMode ? 'text-slate-400' : 'text-slate-600';
            const mainProducts = [
                { name: "Klasik Seri", desc: "Tam deri kaplama, yün iç astar.", img: "https://images.unsplash.com/photo-1617348633378-0cb1e6b3eb27?q=80&w=2070&auto=format&fit=crop" },
                { name: "Hybrid Seri", desc: "Karbon fiber detaylı modern görünüm.", img: "https://images.unsplash.com/photo-1534234828569-2f22c6082987?q=80&w=1974&auto=format&fit=crop" },
                { name: "Slim Metal", desc: "Minimalist çelik ve deri kombinasyonu.", img: "https://images.unsplash.com/photo-1548695602-536417fae29a?q=80&w=2111&auto=format&fit=crop" }
            ];
            const accessories = [
                { title: "Koç Boynuzu", icon: <Anchor size={28} />, text: "316L Paslanmaz Çelik" },
                { title: "Yat Merdiveni", icon: <Shield size={28} />, text: "Kumaş & Deri Kaplama" },
                { title: "Pilot Çarmıhı", icon: <Wind size={28} />, text: "Standartlara Uygun" },
                { title: "Usturmaça Kılıfı", icon: <Scissors size={28} />, text: "Özel Nakış İşlemeli" }
            ];

            return (
                <section id="koleksiyon" className={`py-24 transition-colors duration-500 ${bgMain}`}>
                    <div className="container mx-auto px-6">
                        <div className="text-center mb-20"><h3 className={`text-4xl font-serif ${headingColor}`}>Ürünlerimiz</h3><div className="w-24 h-1 bg-gradient-to-r from-transparent via-amber-500 to-transparent mx-auto mt-6"></div></div>
                        <div className="mb-24">
                            <div className={`flex justify-between items-end mb-10 border-b pb-4 ${darkMode ? 'border-slate-800' : 'border-slate-200'}`}><h4 className={`text-2xl font-serif ${darkMode ? 'text-slate-200' : 'text-slate-800'}`}>Usturmaça Askıları</h4><a href="#" className={`text-xs uppercase tracking-widest text-amber-500 hover:text-amber-600 transition-colors flex items-center gap-2`}>Tümünü Gör <ArrowRight size={14} /></a></div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">{mainProducts.map((item, i) => (<div key={i} className={`group cursor-pointer border transition-all duration-500 pb-6 ${cardBg} hover:border-amber-500/50`}><div className="aspect-[4/5] relative overflow-hidden mb-6"><div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-all z-10"></div><img src={item.img} alt={item.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" /></div><div className="px-6"><h5 className={`text-xl font-serif transition-colors ${darkMode ? 'text-white group-hover:text-amber-400' : 'text-slate-900 group-hover:text-amber-600'}`}>{item.name}</h5><p className={`text-xs mt-2 font-light ${subTextColor}`}>{item.desc}</p></div></div>))}</div>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6">{accessories.map((item, i) => (<div key={i} className={`p-10 text-center hover:-translate-y-2 transition-transform duration-300 border group ${cardBg} hover:border-amber-500/30`}><div className="text-amber-600 mb-6 flex justify-center group-hover:text-amber-500 group-hover:scale-110 transition-all">{item.icon}</div><h5 className={`font-serif mb-3 text-lg ${headingColor}`}>{item.title}</h5><p className={`text-xs font-light ${subTextColor}`}>{item.text}</p></div>))}</div>
                    </div>
                </section>
            );
        };

        const Blog = ({ darkMode }) => {
            const sectionBg = darkMode ? 'bg-[#051120]' : 'bg-white';
            const headingColor = darkMode ? 'text-white' : 'text-slate-900';
            const subTextColor = darkMode ? 'text-slate-400' : 'text-slate-600';
            const posts = [
                { title: "Yat Derisi Bakımının Püf Noktaları", date: "12 ARALIK 2024", img: "https://images.unsplash.com/photo-1549419161-59424c30c345?q=80&w=2070&auto=format&fit=crop" },
                { title: "2025 Monaco Yacht Show İzlenimleri", date: "05 KASIM 2024", img: "https://images.unsplash.com/photo-1569263979104-865ab7cd8d13?q=80&w=2070&auto=format&fit=crop" },
                { title: "Kişiselleştirilmiş Lüks: Refit Süreci", date: "28 EKİM 2024", img: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2070&auto=format&fit=crop" }
            ];

            return (
                <section id="blog" className={`py-24 transition-colors duration-500 ${sectionBg}`}>
                    <div className="container mx-auto px-6">
